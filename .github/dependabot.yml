# Major + security only, monthly. Borrowed from fusionaly-oss.
#
# We deliberately skip minor and patch bumps — they're 90% of dependabot
# noise and rarely worth the merge churn on a small repo. Security
# advisories still fire (those come from GitHub's vulnerability-alerts
# setting, not this file) and major version bumps still arrive because
# they need real review anyway.
version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      go-all:
        patterns: ["*"]
    commit-message:
      prefix: "deps(go)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      actions-all:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
