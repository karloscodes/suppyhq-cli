# Weekly dependabot — Monday early morning, one bundled PR per ecosystem.
# Caps the noise so the inbox isn't full of one-line bumps. Security
# alerts are configured in the repo settings, not here, and they fire
# regardless of this schedule.
version: 2
updates:
  # Go module deps. Bundle minor + patch into a single weekly PR; major
  # bumps come on their own (they need actual review).
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 3
    labels: ["dependencies", "go"]
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      go-minor-and-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions (test.yml + release.yml). Same weekly cadence; group
  # everything because actions versions move together.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 2
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns: ["*"]
