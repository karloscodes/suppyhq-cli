name: release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # Tests + vet first. goreleaser also runs `go test ./...` via its
      # before-hook, but pulling it up to its own step makes a failure
      # show as "tests" in the Actions UI instead of buried under
      # goreleaser's output. Same gate, clearer signal.
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -v ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
